<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KAITLYNARY — Finance PO</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════
   RESET & ROOT
═══════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  /* Original palette preserved */
  --o:#E8622A;
  --o-dim:rgba(232,98,42,0.1);
  --o-brd:rgba(232,98,42,0.22);
  --sand:#F9F6F2;
  --sand2:#EFE9E1;
  --sand3:#E2D9CE;
  --dk:#151210;
  --dk2:#1C1916;
  --dk3:#252019;
  --dk4:#2F2922;
  --radius:12px;

  /* Cinematic Palette additions */
  --ink:#111111;
  --ink-soft:#1B1B1D;
  --ink2:#2E2B27;
  --ink3:#6B6560;
  --sand-soft:#E8DCCF;
  --orange:#C96B3B;
  --orange-soft:#D97B66;
  --ocean:#4C6472;
  --moss:#6E7B61;
  --smoke:#8E8A84;
  --terminal:#FF9B54;
}

/* ─── NIGHT OPS MODE ─────────────────── */
body.night-ops{
  --o:#B85520;
  --o-dim:rgba(185,85,32,0.07);
  --dk:#0A0807;
  --dk2:#131110;
  --dk3:#1A1713;
}
body.night-ops .nav{background:rgba(8,7,6,0.98);}

body{
  background:var(--ink);
  color:var(--sand);
  font-family:'Outfit',sans-serif;
  font-size:13px;
}

/* ═══════════════════════════════════════
   NAV / SYSTEM STATUS BAR
═══════════════════════════════════════ */
.nav{
  position:sticky;top:0;z-index:99;
  background:rgba(17,17,17,0.97);
  border-bottom:1px solid var(--dk4);
  padding:0 20px;
  display:flex;justify-content:space-between;align-items:center;
  height:48px;
  backdrop-filter:blur(8px);
}
.nav-left{display:flex;align-items:center;gap:10px;}
.nav-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:19px;letter-spacing:0.12em;
  color:var(--o);
}
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:#4ADE80;
  animation:blink-dot 2s ease-in-out infinite;
  flex-shrink:0;
}
@keyframes blink-dot{0%,100%{opacity:1;box-shadow:0 0 4px #4ADE80;}50%{opacity:.3;box-shadow:none;}}
.status-msg{
  font-size:9px;font-family:'DM Mono',monospace;
  color:var(--ink3);letter-spacing:.04em;
  transition:opacity .4s ease;
  white-space:nowrap;overflow:hidden;
  max-width:220px;text-overflow:ellipsis;
}
.nav-tabs{display:flex;gap:2px;}
.tab{
  font-size:11px;font-weight:400;
  color:var(--ink3);padding:6px 13px;
  border-radius:6px;border:none;
  background:none;cursor:pointer;
  transition:all .15s;letter-spacing:0.04em;
  font-family:'Outfit',sans-serif;
}
.tab:hover{color:var(--sand);background:var(--dk3);}
.tab.on{color:var(--o);background:var(--o-dim);}

/* ─── CMD PALETTE ─────────────────────── */
.cmd-overlay{
  position:fixed;inset:0;z-index:999;
  background:rgba(10,8,6,0.85);
  backdrop-filter:blur(12px);
  display:flex;align-items:flex-start;justify-content:center;
  padding-top:120px;
  opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.cmd-overlay.open{opacity:1;pointer-events:all;}
.cmd-modal{
  width:100%;max-width:540px;
  background:var(--dk2);
  border:1px solid var(--dk4);
  border-radius:14px;overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.7);
}
.cmd-bar{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--dk4);}
.cmd-prompt{font-family:'DM Mono',monospace;font-size:12px;color:var(--o);}
.cmd-input{
  flex:1;background:none;border:none;outline:none;
  font-family:'DM Mono',monospace;font-size:12px;
  color:var(--sand);caret-color:var(--o);
}
.cmd-hints{padding:10px 18px;display:flex;gap:6px;flex-wrap:wrap;}
.cmd-hint{
  font-size:9px;font-family:'DM Mono',monospace;
  color:var(--ink3);background:var(--dk);
  border:1px solid var(--dk4);
  padding:3px 8px;border-radius:4px;cursor:pointer;
  transition:all .12s;
}
.cmd-hint:hover{color:var(--o);border-color:var(--o-brd);}
.cmd-result{
  padding:16px 18px;
  font-family:'DM Mono',monospace;font-size:11px;
  color:var(--terminal);line-height:1.8;
  border-top:1px solid var(--dk4);
  white-space:pre-wrap;
  display:none;
}
.cmd-result.show{display:block;}
.cmd-close-hint{padding:10px 18px;font-size:9px;color:var(--ink3);font-family:'DM Mono',monospace;border-top:1px solid var(--dk4);text-align:right;}

/* ═══════════════════════════════════════
   PAGES
═══════════════════════════════════════ */
.page{display:none;max-width:680px;margin:0 auto;padding:20px 18px 56px;}
.page.on{display:block;}

/* ═══════════════════════════════════════
   HERO
═══════════════════════════════════════ */
.hero{
  background:var(--o);border-radius:18px;
  padding:34px 30px 30px;margin-bottom:10px;
  position:relative;overflow:hidden;
}
.hero-deco{
  position:absolute;font-family:'Bebas Neue',sans-serif;
  color:rgba(12,10,8,0.07);pointer-events:none;line-height:1;
}
.hero-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.hero-pill{
  font-size:10px;font-weight:500;
  background:rgba(12,10,8,0.13);color:var(--ink);
  padding:3px 11px;border-radius:20px;letter-spacing:0.04em;
}
.hero h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:62px;line-height:.9;
  color:var(--ink);letter-spacing:.02em;
  margin-bottom:14px;position:relative;z-index:1;
}
.hero h1 em{color:#fff;font-style:normal;}
.hero-sub{
  font-size:12px;font-weight:300;
  color:rgba(12,10,8,.6);line-height:1.75;
  max-width:400px;margin-bottom:22px;
  position:relative;z-index:1;
  font-family:'Outfit',sans-serif;
}
.hero-btns{display:flex;gap:8px;position:relative;z-index:1;}
.btn-dk{
  background:var(--ink);color:var(--sand);
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;
  padding:9px 20px;border-radius:8px;border:none;cursor:pointer;
  transition:opacity .15s;
}
.btn-dk:hover{opacity:.8;}
.btn-wh{
  background:#fff;color:var(--o);
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;
  padding:9px 20px;border-radius:8px;border:none;cursor:pointer;
  transition:opacity .15s;
}
.btn-wh:hover{opacity:.88;}

/* ═══════════════════════════════════════
   TICKER
═══════════════════════════════════════ */
.ticker{
  overflow:hidden;border-radius:10px;
  border:1px solid var(--dk4);
  background:var(--dk2);padding:8px 0;
  margin-bottom:10px;
}
.ticker-track{
  display:flex;gap:22px;width:max-content;
  animation:scroll 28s linear infinite;white-space:nowrap;
}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.t-i{display:inline-flex;align-items:center;gap:8px;flex-shrink:0;font-size:11px;color:var(--ink3);}
.t-sym{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--o);}

/* ═══════════════════════════════════════
   BENTO
═══════════════════════════════════════ */
.bento{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.card{border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;transition:transform .15s;}
.card:hover{transform:translateY(-2px);}
.card.w2{grid-column:1/-1;}

/* card skins */
.ck-dk {background:var(--dk);border:1px solid var(--dk4);}
.ck-dk2{background:var(--dk2);border:1px solid var(--dk4);}
.ck-o  {background:var(--o);border:none;}
.ck-s  {background:var(--sand);border:1px solid var(--sand3);}
.ck-s2 {background:var(--sand2);border:1px solid var(--sand3);}

/* typography atoms */
.eye{font-size:9px;font-weight:500;letter-spacing:.11em;text-transform:uppercase;margin-bottom:8px;}
.eye-m{color:var(--ink3);}
.eye-s{color:rgba(249,246,242,.35);}
.eye-k{color:var(--ink2);}
.eye-o{color:rgba(12,10,8,.45);}

.big{font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;line-height:1.05;margin-bottom:6px;}
.big-s{color:var(--sand);}
.big-k{color:var(--ink);}
.big-o{color:var(--o);}
.big-w{color:#fff;}
.fs32{font-size:32px;}
.fs26{font-size:26px;}
.fs20{font-size:20px;}

.body{font-size:11px;font-weight:300;line-height:1.7;}
.body-m{color:var(--ink3);}
.body-s{color:rgba(249,246,242,.5);}
.body-k{color:var(--ink2);}
.body-o{color:rgba(12,10,8,.6);}

/* ─── STATS ──────────────────────────── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
.stat{padding:14px 10px;border-radius:10px;text-align:center;background:var(--dk2);}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--o);letter-spacing:.04em;display:block;}
.stat-l{font-size:9px;color:var(--ink3);margin-top:2px;display:block;line-height:1.4;}

/* ─── STRIP ──────────────────────────── */
.strip{background:var(--o);border-radius:10px;overflow:hidden;padding:9px 0;margin-bottom:10px;}
.strip-track{display:flex;gap:18px;width:max-content;animation:scroll 22s linear infinite;white-space:nowrap;}
.strip-item{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.1em;color:var(--ink);flex-shrink:0;display:inline-flex;align-items:center;gap:14px;}
.strip-sep{color:rgba(12,10,8,.25);}

/* ─── TAGS ───────────────────────────── */
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.tag{font-size:10px;padding:4px 10px;border-radius:6px;}
.tg-o{background:var(--o-dim);color:var(--o);border:1px solid var(--o-brd);}
.tg-s{background:var(--sand2);color:var(--ink2);border:1px solid var(--sand3);}
.tg-d{background:var(--dk2);color:var(--ink3);border:1px solid var(--dk4);}
.tg-ok{background:rgba(74,222,128,.1);color:#4ADE80;border:1px solid rgba(74,222,128,.2);}
.tg-ip{background:var(--o-dim);color:var(--o);border:1px solid var(--o-brd);}

/* ─── DOMAIN GRID ────────────────────── */
.domain-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.domain-cell{background:var(--dk);border:1px solid var(--dk4);border-radius:10px;padding:12px;}
.domain-icon{font-size:18px;margin-bottom:7px;}
.domain-icon img{width:20px;height:20px;object-fit:contain;border-radius:4px;}
.domain-name{font-size:11px;font-weight:500;color:var(--sand);margin-bottom:4px;}
.domain-desc{font-size:10px;font-weight:300;color:var(--ink3);line-height:1.55;}

/* ─── SKILL SECTION ──────────────────── */
.skill-sect{margin-bottom:10px;}
.skill-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--o);margin-bottom:7px;}

/* ─── TIMELINE ───────────────────────── */
.tl{display:flex;flex-direction:column;gap:0;}
.tl-row{display:flex;gap:14px;padding-bottom:22px;}
.tl-row:last-child{padding-bottom:0;}
.tl-spine{display:flex;flex-direction:column;align-items:center;width:32px;flex-shrink:0;}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--o);flex-shrink:0;margin-top:5px;}
.tl-dot.sm{width:7px;height:7px;background:var(--dk4);margin-top:7px;}
.tl-line{width:1px;background:var(--dk4);flex:1;margin-top:5px;}
.tl-body{flex:1;}
.tl-co{font-size:13px;font-weight:500;color:var(--sand);margin-bottom:1px;}
.tl-role{font-size:11px;color:var(--o);font-weight:400;margin-bottom:2px;}
.tl-date{font-size:10px;color:var(--ink3);margin-bottom:8px;font-family:'DM Mono',monospace;}
.tl-li{list-style:none;display:flex;flex-direction:column;gap:4px;}
.tl-li li{font-size:11px;font-weight:300;color:var(--ink3);line-height:1.55;padding-left:12px;position:relative;}
.tl-li li::before{content:'—';position:absolute;left:0;color:var(--dk4);}
.award{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:500;color:#FBBF24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);padding:2px 8px;border-radius:4px;margin-top:6px;margin-right:4px;}

/* ─── CASE CARDS ─────────────────────── */
.case{background:var(--dk);border:1px solid var(--dk4);border-radius:var(--radius);padding:18px;margin-bottom:10px;transition:border-color .15s;}
.case:hover{border-color:var(--o);}
.case-hd{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;}
.case-ico{width:36px;height:36px;border-radius:9px;background:var(--o-dim);border:1px solid var(--o-brd);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.case-ico img{width:20px;height:20px;object-fit:contain;border-radius:4px;}
.case-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.case-chip{font-size:9px;font-weight:500;color:var(--o);background:var(--o-dim);border:1px solid var(--o-brd);padding:2px 7px;border-radius:4px;}
.case-name{font-size:13px;font-weight:500;color:var(--sand);}
.trio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.trio-cell{background:var(--dk2);border-radius:8px;padding:10px;}
.trio-lbl{font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
.trio-txt{font-size:10px;font-weight:300;color:rgba(249,246,242,.55);line-height:1.6;}

/* ─── PROJECT FILTER ─────────────────── */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;padding:12px 14px;background:var(--dk2);border-radius:10px;border:1px solid var(--dk4);}
.filter-btn{
  font-size:10px;font-family:'DM Mono',monospace;
  padding:5px 12px;border-radius:6px;border:1px solid var(--dk4);
  background:var(--dk);color:var(--ink3);cursor:pointer;
  transition:all .15s;
}
.filter-btn:hover{color:var(--sand);border-color:var(--dk3);}
.filter-btn.active{background:var(--o-dim);color:var(--o);border-color:var(--o-brd);}
.case{transition:border-color .15s,opacity .25s,transform .25s;}
.case.hidden{display:none;}

/* ─── QUOTE ──────────────────────────── */
.quote-block{background:var(--o);border-radius:14px;padding:24px 26px;margin-bottom:10px;position:relative;overflow:hidden;}
.quote-deco{position:absolute;font-family:'Instrument Serif',serif;font-size:160px;right:-10px;bottom:-40px;color:rgba(12,10,8,.07);line-height:1;pointer-events:none;font-style:italic;}
.quote-text{font-family:'Instrument Serif',serif;font-style:italic;font-size:18px;color:var(--ink);line-height:1.45;position:relative;z-index:1;}

/* ─── EDU ────────────────────────────── */
.edu{display:flex;gap:12px;padding:13px;background:var(--dk2);border-radius:10px;border:1px solid var(--dk4);margin-bottom:8px;}
.edu-ico{width:32px;height:32px;border-radius:8px;background:var(--o-dim);border:1px solid var(--o-brd);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.edu-title{font-size:12px;font-weight:500;color:var(--sand);margin-bottom:2px;}
.edu-sub{font-size:11px;color:var(--o);}
.edu-date{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace;}

/* ─── CERT ───────────────────────────── */
.cert{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--dk2);border-radius:8px;border:1px solid var(--dk4);margin-bottom:6px;}
.cert-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.cert-name{font-size:11px;font-weight:300;color:var(--sand);flex:1;}
.cert-yr{font-size:10px;font-family:'DM Mono',monospace;}

/* ─── CTA ────────────────────────────── */
.cta{background:var(--sand);border-radius:14px;padding:28px;text-align:center;position:relative;overflow:hidden;margin-top:10px;}
.cta-deco{position:absolute;font-family:'Bebas Neue',sans-serif;color:var(--sand3);line-height:1;pointer-events:none;}
.cta-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.04em;color:var(--ink);margin-bottom:6px;position:relative;z-index:1;}
.cta-sub{font-size:12px;font-weight:300;color:var(--ink2);margin-bottom:18px;position:relative;z-index:1;}
.btn-o{background:var(--o);color:#fff;font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;transition:opacity .15s;position:relative;z-index:1;}
.btn-o:hover{opacity:.88;}

/* ─── TERMINAL ANIMATION ─────────────── */
.terminal-scan{
  background:var(--ink);border:1px solid var(--o-brd);
  border-radius:8px;padding:14px 16px;margin-top:10px;
  font-family:'DM Mono',monospace;font-size:11px;
  color:var(--terminal);line-height:1.9;
  display:none;position:relative;z-index:1;
}
.terminal-scan.show{display:block;}

/* ─── LANG ───────────────────────────── */
.lang-row{display:flex;gap:8px;flex-wrap:wrap;}
.lang{background:var(--dk);border:1px solid var(--dk4);border-radius:10px;padding:11px 16px;text-align:center;flex:1;min-width:80px;}
.lang-flag{font-size:18px;margin-bottom:4px;}
.lang-name{font-size:11px;font-weight:500;color:var(--sand);}
.lang-lv{font-size:10px;color:var(--o);margin-top:1px;}

/* ─── NOW ────────────────────────────── */
.now-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;}
.now-ico{font-size:15px;flex-shrink:0;margin-top:1px;}
.now-title{font-size:11px;font-weight:500;color:var(--sand);margin-bottom:2px;}
.now-body{font-size:11px;font-weight:300;color:var(--ink3);line-height:1.55;}

/* ─── KEYFRAMES ──────────────────────── */
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ═══════════════════════════════════════
   RESPONSIVE — MOBILE
═══════════════════════════════════════ */
@media(max-width:576px){
  .nav{padding:0 12px;}
  .status-msg{display:none;}
  .tab{padding:5px 9px;font-size:10px;}

  .page{padding:12px 12px 48px;}

  /* Hero */
  .hero{padding:22px 18px 20px;}
  .hero h1{font-size:44px;}

  /* Bento → single column */
  .bento{grid-template-columns:1fr;}
  .card.w2{grid-column:auto;}

  /* Stats → single column */
  .stats{grid-template-columns:1fr 1fr;}

  /* Domain grid → single column */
  .domain-grid{grid-template-columns:1fr;}

  /* Trio → single column */
  .trio{grid-template-columns:1fr;}

  /* Toolbox inner grid */
  .toolbox-grid{grid-template-columns:1fr !important;}

  /* Lang row → wrap */
  .lang{min-width:calc(50% - 4px);flex:none;}

  /* Filter bar */
  .filter-bar{gap:5px;}
  .filter-btn{font-size:9px;padding:4px 9px;}

  /* Hero pills */
  .hero-pills{gap:4px;}
  .hero-pill{font-size:9px;}

  /* Quote */
  .quote-text{font-size:15px;}

  /* CTA */
  .cta-title{font-size:20px;}

  /* CMD palette */
  .cmd-overlay{padding-top:60px;padding-left:12px;padding-right:12px;}
}
</style>
</head>
<body>

<!-- ═══ COMMAND PALETTE ═══ -->
<div class="cmd-overlay" id="cmdOverlay">
  <div class="cmd-modal">
    <div class="cmd-bar">
      <span class="cmd-prompt">&gt;_</span>
      <input class="cmd-input" id="cmdInput" type="text" placeholder="Type a command..." autocomplete="off" spellcheck="false"/>
    </div>
    <div class="cmd-hints" id="cmdHints"></div>
    <div class="cmd-result" id="cmdResult"></div>
    <div class="cmd-close-hint">ESC to close · CMD+K to toggle</div>
  </div>
</div>

<!-- ═══ NAV ═══ -->
<nav class="nav">
  <div class="nav-left">
    <span class="nav-logo" id="navLogo">KAITLYNARY</span>
    <div class="status-dot"></div>
    <span class="status-msg" id="statusMsg"></span>
  </div>
  <div class="nav-tabs" id="navTabs"></div>
</nav>

<!-- ═══ PAGES ═══ -->
<div id="p1" class="page on"></div>
<div id="p2" class="page"></div>
<div id="p3" class="page"></div>
<div id="p4" class="page"></div>
<div id="p5" class="page"></div>

<script>
/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
function isUrl(s){ return s && (s.startsWith('http://') || s.startsWith('https://')); }
function renderIcon(val, cls=''){
  if(isUrl(val)) return `<img src="${val}" class="${cls}" style="width:20px;height:20px;object-fit:contain;border-radius:4px;" alt="icon"/>`;
  return val;
}
function el(tag, cls, html='', attrs={}){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  e.innerHTML = html;
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
  return e;
}
function go(id, tabEl){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  if(tabEl) tabEl.classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ═══════════════════════════════════════
   NIGHT-OPS AUTO MODE
═══════════════════════════════════════ */
function initNightOps(){
  const h = new Date().getHours();
  if(h >= 18 || h < 6) document.body.classList.add('night-ops');
}

/* ═══════════════════════════════════════
   STATUS BAR ROTATOR
═══════════════════════════════════════ */
function initStatusRotator(messages){
  const el = document.getElementById('statusMsg');
  let i = 0;
  function update(){
    el.style.opacity = '0';
    setTimeout(() => {
      el.textContent = messages[i % messages.length];
      el.style.opacity = '1';
      i++;
    }, 400);
  }
  update();
  setInterval(update, 4000);
}

/* ═══════════════════════════════════════
   COMMAND PALETTE
═══════════════════════════════════════ */
function initCommandPalette(commands){
  const overlay = document.getElementById('cmdOverlay');
  const input   = document.getElementById('cmdInput');
  const result  = document.getElementById('cmdResult');
  const hints   = document.getElementById('cmdHints');

  // Render hint buttons
  Object.keys(commands).forEach(cmd => {
    const b = el('button','cmd-hint',cmd);
    b.onclick = () => runCmd(cmd);
    hints.appendChild(b);
  });

  function openPalette(){
    overlay.classList.add('open');
    input.value = '';
    result.classList.remove('show');
    setTimeout(()=>input.focus(),50);
  }
  function closePalette(){ overlay.classList.remove('open'); }

  function runCmd(cmd){
    const txt = commands[cmd];
    if(txt){
      result.textContent = txt;
      result.classList.add('show');
    } else {
      result.textContent = `Command not found: "${cmd}"\nAvailable: ${Object.keys(commands).join(', ')}`;
      result.classList.add('show');
    }
  }

  document.addEventListener('keydown', e => {
    if((e.metaKey || e.ctrlKey) && e.key === 'k'){
      e.preventDefault();
      overlay.classList.contains('open') ? closePalette() : openPalette();
    }
    if(e.key === 'Escape') closePalette();
    if(e.key === 'Enter' && overlay.classList.contains('open')){
      runCmd(input.value.trim().toLowerCase());
    }
  });
  overlay.addEventListener('click', e => { if(e.target === overlay) closePalette(); });
}

/* ═══════════════════════════════════════
   NAV TABS
═══════════════════════════════════════ */
const TABS = [
  {label:'Home', page:'p1'},
  {label:'Skills', page:'p2'},
  {label:'Journey', page:'p3'},
  {label:'Work', page:'p4'},
  {label:'About', page:'p5'}
];
function buildNav(){
  const container = document.getElementById('navTabs');
  TABS.forEach((t,i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i===0?' on':'');
    btn.textContent = t.label;
    btn.onclick = () => go(t.page, btn);
    container.appendChild(btn);
  });
}

/* ═══════════════════════════════════════

═══════════════════════════════════════ */

    const pillsHtml = hero.pills.map(p=>`<span class="hero-pill">${p}</span>`).join('');
    const heroDiv = el('div','hero', `
      <div class="hero-deco" style="font-size:190px;right:-24px;top:-38px;">$</div>
      <div class="hero-deco" style="font-size:85px;left:16px;bottom:-14px;">₫</div>
      <div class="hero-deco" style="font-size:52px;right:88px;bottom:20px;opacity:.06;">€</div>
      <div class="hero-pills">${pillsHtml}</div>
      <h1>${hero.title}</h1>
      <p class="hero-sub">${hero.subtitle}</p>
      <div class="hero-btns">
        <button class="btn-dk" id="heroCta1">${hero.cta_primary}</button>
        <button class="btn-wh" id="heroCta2">${hero.cta_secondary}</button>
      </div>
    `);
    page.appendChild(heroDiv);
    document.getElementById('heroCta1').onclick = () => go(hero.cta_primary_target, document.querySelectorAll('.tab')[3]);
    document.getElementById('heroCta2').onclick = () => go(hero.cta_secondary_target, document.querySelectorAll('.tab')[4]);
  }

  // TICKER
  const tickerItems = [...d.ticker_items, ...d.ticker_items];
  const tickerHtml  = tickerItems.map(t=>`<span class="t-i"><span class="t-sym">${t.sym}</span>${t.text}</span>`).join('');
  page.appendChild(el('div','ticker',`<div class="ticker-track">${tickerHtml}</div>`));

  // BENTO — stats + highlight cards
  const bento = el('div','bento');

  // Stats card (full width)
  const metricsHtml = d.live_metrics.map(m=>`
    <div class="stat"><span class="stat-n">${m.number}</span><span class="stat-l">${m.label}</span></div>
  `).join('');
  bento.appendChild(el('div','card ck-dk w2',`
    <div class="eye eye-m">impact by numbers</div>
    <div class="stats">${metricsHtml}</div>
  `));

  // Highlight cards
  d.highlight_cards.forEach(c => {
    if(!c.visible) return;
    bento.appendChild(el('div',`card ${c.skin}`,`
      <div class="eye ${c.eye_style}">${c.eye}</div>
      <div class="big ${c.big_style}">${c.big}</div>
      <div class="body ${c.body_style}">${c.body}</div>
    `));
  });

  // Domain coverage (full width)
  const domainHtml = d.domain_coverage.filter(x=>x.visible).map(dom=>`
    <div class="domain-cell">
      <div class="domain-icon">${renderIcon(dom.icon)}</div>
      <div class="domain-name">${dom.name}</div>
      <div class="domain-desc">${dom.desc}</div>
    </div>
  `).join('');
  bento.appendChild(el('div','card ck-dk2 w2',`
    <div class="eye eye-m">where I operate</div>
    <div class="big big-s fs20" style="margin-bottom:12px;">DOMAIN COVERAGE</div>
    <div class="domain-grid">${domainHtml}</div>
  `));

  page.appendChild(bento);
}

/* ═══════════════════════════════════════
   PAGE 3 — JOURNEY
═══════════════════════════════════════ */
function buildPage3(d){
  const page = document.getElementById('p3');

  // Header card
  const jh = d.journey_header;
  if(jh.visible){
    page.appendChild(el('div','card ck-o w2',`
      <div class="eye eye-o">${jh.eye}</div>
      <div class="big big-k fs26">${jh.title}</div>
      <div class="body body-o" style="margin-top:6px;">${jh.body}</div>
    `, {style:'border-radius:14px;padding:20px;margin-bottom:10px;'}));
  }

  // Timeline card
  const tlRows = d.experience_timeline.filter(x=>x.visible).map((exp, i, arr) => {
    const isLast = i === arr.length - 1;
    const dotClass = exp.dot_style === 'minor' ? 'tl-dot sm' : 'tl-dot';
    const bullets = exp.bullets.map(b=>`<li>${b}</li>`).join('');
    const awards = exp.awards.length ? `<div>${exp.awards.map(a=>`<span class="award">${a}</span>`).join('')}</div>` : '';
    return `
      <div class="tl-row">
        <div class="tl-spine">
          <div class="${dotClass}"></div>
          ${!isLast ? '<div class="tl-line"></div>' : ''}
        </div>
        <div class="tl-body">
          <div class="tl-co">${exp.company}</div>
          <div class="tl-role">${exp.role}</div>
          <div class="tl-date">${exp.date}</div>
          <ul class="tl-li">${bullets}</ul>
          ${awards}
        </div>
      </div>
    `;
  }).join('');

  page.appendChild(el('div','card ck-dk w2',`<div class="tl">${tlRows}</div>`));
}

/* ═══════════════════════════════════════
   PAGE 4 — WORK (with filter)
═══════════════════════════════════════ */
function buildPage4(d){
  const page = document.getElementById('p4');

  // Strip
  const strDup = [...d.work_strip,...d.work_strip];
  page.appendChild(el('div','strip',`
    <div class="strip-track">${strDup.map(s=>`<span class="strip-item">${s} <span class="strip-sep">✦</span></span>`).join('')}</div>
  `));

  // Extract unique tags
  const allTags = ['All'];
  d.case_studies.filter(c=>c.visible).forEach(c => {
    c.tags.forEach(t => { if(!allTags.includes(t)) allTags.push(t); });
  });

  // Filter bar
  const filterBar = el('div','filter-bar');
  allTags.forEach(tag => {
    const btn = el('button','filter-btn' + (tag==='All'?' active':''), tag);
    btn.onclick = () => {
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const cases = document.querySelectorAll('.case[data-tags]');
      cases.forEach(c => {
        if(tag === 'All' || c.dataset.tags.split('|').includes(tag)){
          c.classList.remove('hidden');
        } else {
          c.classList.add('hidden');
        }
      });
    };
    filterBar.appendChild(btn);
  });
  page.appendChild(filterBar);

  // Cases
  const visible = d.case_studies.filter(c=>c.visible);
  visible.forEach(cs => {
    const iconHtml = isUrl(cs.icon)
      ? `<img src="${cs.icon}" style="width:20px;height:20px;object-fit:contain;border-radius:4px;" alt=""/>`
      : cs.icon;

    const chipsHtml = cs.chips.map(ch=>`<span class="case-chip">${ch}</span>`).join('');

    const caseEl = el('div','case',`
      <div class="case-hd">
        <div class="case-ico">${iconHtml}</div>
        <div>
          <div class="case-name">${cs.name}</div>
          <div class="case-chips">${chipsHtml}</div>
        </div>
      </div>
      <div class="trio">
        <div class="trio-cell"><div class="trio-lbl">Problem</div><div class="trio-txt">${cs.problem}</div></div>
        <div class="trio-cell"><div class="trio-lbl">What I did</div><div class="trio-txt">${cs.what_i_did}</div></div>
        <div class="trio-cell"><div class="trio-lbl">Outcome</div><div class="trio-txt">${cs.outcome}</div></div>
      </div>
    `);
    caseEl.dataset.tags = cs.tags.join('|');
    page.appendChild(caseEl);
  });
}

/* ═══════════════════════════════════════
   TERMINAL CTA
═══════════════════════════════════════ */
function initTerminalCTA(email){
  const btn  = document.getElementById('ctaBtn');
  const scan = document.getElementById('terminalScan');
  if(!btn || !scan) return;
  let fired = false;
  const lines = [
    '> Initializing deployment sequence...',
    '> Scanning: Finance domain expertise ✓',
    '> Scanning: Cross-timezone operations ✓',
    '> Scanning: 60+ country PO scope ✓',
    '> Scanning: BA × PO hybrid profile ✓',
    '> Status: READY FOR DEPLOYMENT',
    `> Contact: ${email}`
  ];
  btn.onclick = () => {
    if(fired) return;
    fired = true;
    btn.disabled = true;
    btn.style.opacity = '.5';
    scan.classList.add('show');
    scan.innerHTML = '';
    let i = 0;
    const interval = setInterval(() => {
      if(i < lines.length){
        scan.innerHTML += lines[i] + '\n';
        i++;
      } else {
        clearInterval(interval);
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.textContent = `→ ${email}`;
        btn.onclick = () => window.location.href = `mailto:${email}`;
      }
    }, 170);
  };
}

/* ═══════════════════════════════════════
   BOOTSTRAP — LOAD JSON & RENDER
═══════════════════════════════════════ */
async function init(){
  let d;
  try {
    const res = await fetch('./portfolio-data.json');
    d = await res.json();
  } catch(err) {
    console.warn('Could not load portfolio-data.json, using inline fallback.', err);
    // Fallback so the page doesn't break if JSON isn't served
    document.getElementById('p1').innerHTML = '<div style="padding:40px;font-family:DM Mono,monospace;color:#E8622A;">⚠ Could not load portfolio-data.json.<br>Host both files from the same server or open via Live Server.</div>';
    return;
  }

  // Apply system status
  document.getElementById('navLogo').textContent = d.system_status.logo_text;
  initStatusRotator(d.system_status.status_messages);

  // Night-ops check
  initNightOps();

  // Nav
  buildNav();

  // Pages
  buildPage1(d);
  buildPage2(d);
  buildPage3(d);
  buildPage4(d);
  buildPage5(d);

  // Command palette
  initCommandPalette(d.terminal_commands);
}

init();
