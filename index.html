<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KAITLYNARY — Tech PO · Finance Systems · Global Scale</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════
   RESET
══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}

/* ══════════════════════════════════════════
   ROOT — CINEMATIC PALETTE
══════════════════════════════════════════ */
:root{
  --ink:#111111;
  --ink-soft:#1B1B1D;
  --ink2:#2E2B27;
  --ink3:#6B6560;
  --sand:#F5EFE7;
  --sand2:#EDE5D8;
  --sand3:#E0D4C3;
  --orange:#C96B3B;
  --orange-soft:#D97B66;
  --orange-dim:rgba(201,107,59,0.10);
  --orange-brd:rgba(201,107,59,0.22);
  --ocean:#4C6472;
  --moss:#6E7B61;
  --smoke:#8E8A84;
  --terminal:#FF9B54;
  --dk:#131110;
  --dk2:#1A1714;
  --dk3:#222019;
  --dk4:#2D2923;
  --radius:12px;
  --glow:rgba(201,107,59,0.07);
}

/* ── NIGHT OPS ─────────────────────────── */
body.night-ops{
  --orange:#A85420;
  --orange-dim:rgba(168,84,32,0.07);
  --dk:#0B0907;
  --dk2:#111009;
  --dk3:#171411;
  --dk4:#211D18;
  --glow:rgba(168,84,32,0.04);
}
body.night-ops .nav{background:rgba(8,7,5,0.98);}
body.night-ops .night-tag{display:inline-flex !important;}

body{
  background:var(--dk);
  color:var(--sand);
  font-family:'Outfit',sans-serif;
  font-size:13px;
  cursor:default;
}

/* ── GRAIN OVERLAY ─────────────────────── */
body::before{
  content:'';
  position:fixed;inset:0;
  pointer-events:none;z-index:1000;
  opacity:.018;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}

/* ── CURSOR GLOW ────────────────────────── */
.cursor-glow{
  position:fixed;pointer-events:none;z-index:998;
  width:320px;height:320px;border-radius:50%;
  background:radial-gradient(circle,var(--glow) 0%,transparent 70%);
  transform:translate(-50%,-50%);
  transition:opacity .4s ease;
  opacity:0;
}

/* ══════════════════════════════════════════
   NAV
══════════════════════════════════════════ */
.nav{
  position:sticky;top:0;z-index:99;
  background:rgba(17,17,17,0.96);
  border-bottom:1px solid var(--dk4);
  padding:0 20px;
  display:flex;justify-content:space-between;align-items:center;
  height:48px;
  backdrop-filter:blur(10px);
}
.nav-left{display:flex;align-items:center;gap:9px;min-width:0;}
.nav-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:0.12em;color:var(--orange);
  flex-shrink:0;
}
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:#4ADE80;flex-shrink:0;
  box-shadow:0 0 6px #4ADE80;
  animation:pulse-dot 2.4s ease-in-out infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1;box-shadow:0 0 6px #4ADE80;}50%{opacity:.25;box-shadow:none;}}
.status-msg{
  font-size:9px;font-family:'DM Mono',monospace;
  color:var(--ink3);letter-spacing:.04em;
  transition:opacity .5s ease;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:260px;
}
.night-tag{
  display:none;
  font-size:9px;font-family:'DM Mono',monospace;
  color:var(--terminal);background:rgba(255,155,84,.08);
  border:1px solid rgba(255,155,84,.18);
  padding:2px 7px;border-radius:4px;flex-shrink:0;
}
.nav-tabs{display:flex;gap:1px;}
.tab{
  font-size:10px;font-weight:400;font-family:'DM Mono',monospace;
  color:var(--ink3);padding:6px 11px;
  border-radius:6px;border:none;
  background:none;cursor:pointer;
  transition:all .15s;letter-spacing:0.02em;
}
.tab:hover{color:var(--sand);background:var(--dk3);}
.tab.on{color:var(--orange);background:var(--orange-dim);border:1px solid var(--orange-brd);}

/* ══════════════════════════════════════════
   CMD PALETTE
══════════════════════════════════════════ */
.cmd-overlay{
  position:fixed;inset:0;z-index:9999;
  background:rgba(8,7,5,0.88);backdrop-filter:blur(16px);
  display:flex;align-items:flex-start;justify-content:center;
  padding-top:100px;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.cmd-overlay.open{opacity:1;pointer-events:all;}
.cmd-modal{
  width:100%;max-width:560px;
  background:var(--dk2);
  border:1px solid var(--dk4);border-radius:14px;
  overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.8),0 0 0 1px rgba(201,107,59,.08);
}
.cmd-bar{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--dk4);}
.cmd-prompt{font-family:'DM Mono',monospace;font-size:13px;color:var(--orange);}
.cmd-input{
  flex:1;background:none;border:none;outline:none;
  font-family:'DM Mono',monospace;font-size:12px;
  color:var(--sand);caret-color:var(--orange);
}
.cmd-input::placeholder{color:var(--ink3);}
.cmd-hints{padding:10px 16px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--dk4);}
.cmd-hint{
  font-size:9px;font-family:'DM Mono',monospace;
  color:var(--ink3);background:var(--dk);
  border:1px solid var(--dk4);padding:3px 8px;border-radius:4px;
  cursor:pointer;transition:all .12s;
}
.cmd-hint:hover{color:var(--orange);border-color:var(--orange-brd);}
.cmd-result{
  padding:16px 18px;
  font-family:'DM Mono',monospace;font-size:11px;
  color:var(--terminal);line-height:1.9;
  white-space:pre-wrap;display:none;
  border-bottom:1px solid var(--dk4);
  animation:fadeIn .2s ease;
}
.cmd-result.show{display:block;}
.cmd-footer{padding:8px 16px;font-size:9px;color:var(--ink3);font-family:'DM Mono',monospace;display:flex;justify-content:space-between;}

/* ══════════════════════════════════════════
   PAGES
══════════════════════════════════════════ */
.page{display:none;max-width:680px;margin:0 auto;padding:20px 18px 60px;}
.page.on{display:block;}

/* ══════════════════════════════════════════
   HERO
══════════════════════════════════════════ */
.hero{
  background:var(--orange);border-radius:18px;
  padding:34px 30px 30px;margin-bottom:10px;
  position:relative;overflow:hidden;
}
.hero-deco{
  position:absolute;font-family:'Bebas Neue',sans-serif;
  color:rgba(12,10,8,0.06);pointer-events:none;line-height:1;
}
.hero-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.hero-pill{
  font-size:10px;font-weight:500;font-family:'DM Mono',monospace;
  background:rgba(12,10,8,0.12);color:rgba(12,10,8,.75);
  padding:3px 11px;border-radius:20px;letter-spacing:.03em;
}
.hero h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:58px;line-height:.92;
  color:var(--ink);letter-spacing:.02em;
  margin-bottom:16px;position:relative;z-index:1;
}
.hero h1 em{color:#fff;font-style:normal;}
.hero-sub{
  font-size:12px;font-weight:300;
  color:rgba(12,10,8,.58);line-height:1.8;
  max-width:420px;margin-bottom:22px;
  position:relative;z-index:1;
}
.hero-btns{display:flex;gap:8px;position:relative;z-index:1;}
.btn-dk{
  background:var(--ink);color:var(--sand);
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;
  padding:9px 20px;border-radius:8px;border:none;cursor:pointer;
  transition:opacity .15s;
}
.btn-dk:hover{opacity:.8;}
.btn-wh{
  background:rgba(255,255,255,.9);color:var(--orange);
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;
  padding:9px 20px;border-radius:8px;border:none;cursor:pointer;
  transition:opacity .15s;
}
.btn-wh:hover{opacity:.85;}

/* ══════════════════════════════════════════
   TICKER
══════════════════════════════════════════ */
.ticker{
  overflow:hidden;border-radius:10px;
  border:1px solid var(--dk4);background:var(--dk2);
  padding:8px 0;margin-bottom:10px;
}
.ticker-track{
  display:flex;gap:24px;width:max-content;
  animation:scroll 32s linear infinite;white-space:nowrap;
}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.t-i{display:inline-flex;align-items:center;gap:8px;flex-shrink:0;font-size:11px;color:var(--ink3);}
.t-sym{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--orange);}

/* ══════════════════════════════════════════
   BENTO
══════════════════════════════════════════ */
.bento{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.card{
  border-radius:var(--radius);padding:18px;
  position:relative;overflow:hidden;
  transition:transform .2s ease,box-shadow .2s ease;
}
.card:hover{transform:translateY(-2px);}
.card.w2{grid-column:1/-1;}
.ck-dk {background:var(--dk);border:1px solid var(--dk4);}
.ck-dk:hover{box-shadow:0 8px 24px rgba(0,0,0,.3);}
.ck-dk2{background:var(--dk2);border:1px solid var(--dk4);}
.ck-o  {background:var(--orange);border:none;}
.ck-s  {background:var(--sand);border:1px solid var(--sand3);}
.ck-s2 {background:var(--sand2);border:1px solid var(--sand3);}

/* typography atoms */
.eye{font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}
.eye-m{color:var(--ink3);}
.eye-o{color:rgba(12,10,8,.42);}
.eye-k{color:var(--ink2);}
.big{font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;line-height:1.05;margin-bottom:6px;}
.big-s{color:var(--sand);}
.big-k{color:var(--ink);}
.big-o{color:var(--orange);}
.fs32{font-size:32px;}
.fs26{font-size:26px;}
.fs20{font-size:20px;}
.body{font-size:11px;font-weight:300;line-height:1.75;}
.body-m{color:var(--ink3);}
.body-o{color:rgba(12,10,8,.58);}
.body-k{color:var(--ink2);}

/* ══════════════════════════════════════════
   LIVE METRICS
══════════════════════════════════════════ */
.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
.metric{padding:16px 10px;border-radius:10px;text-align:center;background:var(--dk2);border:1px solid var(--dk4);}
.metric-n{
  font-family:'Bebas Neue',sans-serif;font-size:32px;
  color:var(--orange);letter-spacing:.04em;display:block;
}
.metric-l{font-size:9px;color:var(--ink3);margin-top:3px;display:block;line-height:1.45;}

/* ══════════════════════════════════════════
   STRIP
══════════════════════════════════════════ */
.strip{background:var(--orange);border-radius:10px;overflow:hidden;padding:9px 0;margin-bottom:10px;}
.strip-track{display:flex;gap:18px;width:max-content;animation:scroll 24s linear infinite;white-space:nowrap;}
.strip-item{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.1em;color:var(--ink);flex-shrink:0;display:inline-flex;align-items:center;gap:14px;}
.strip-sep{color:rgba(12,10,8,.22);}

/* ══════════════════════════════════════════
   TAGS
══════════════════════════════════════════ */
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.tag{font-size:10px;padding:4px 10px;border-radius:6px;}
.tg-o{background:var(--orange-dim);color:var(--orange);border:1px solid var(--orange-brd);}
.tg-s{background:var(--sand2);color:var(--ink2);border:1px solid var(--sand3);}
.tg-d{background:var(--dk2);color:var(--ink3);border:1px solid var(--dk4);}
.tg-ok{background:rgba(74,222,128,.1);color:#4ADE80;border:1px solid rgba(74,222,128,.2);}
.tg-ip{background:var(--orange-dim);color:var(--orange);border:1px solid var(--orange-brd);}

/* ══════════════════════════════════════════
   DOMAIN GRID
══════════════════════════════════════════ */
.domain-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.domain-cell{background:var(--dk);border:1px solid var(--dk4);border-radius:10px;padding:12px;transition:border-color .15s;}
.domain-cell:hover{border-color:var(--orange-brd);}
.domain-icon{font-size:18px;margin-bottom:7px;}
.domain-icon img{width:20px;height:20px;object-fit:contain;vertical-align:middle;}
.domain-name{font-size:11px;font-weight:500;color:var(--sand);margin-bottom:4px;}
.domain-desc{font-size:10px;font-weight:300;color:var(--ink3);line-height:1.55;}

/* ══════════════════════════════════════════
   MEMORY LOGS
══════════════════════════════════════════ */
.memory-logs{margin-bottom:10px;}
.memory-header{
  font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink3);margin-bottom:10px;
  font-family:'DM Mono',monospace;
}
.memory-row{
  display:flex;gap:14px;align-items:baseline;
  padding:9px 0;
  border-bottom:1px solid var(--dk4);
}
.memory-row:last-child{border-bottom:none;}
.memory-year{
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--orange);flex-shrink:0;width:36px;
}
.memory-note{font-size:11px;font-weight:300;color:var(--ink3);line-height:1.6;}

/* ══════════════════════════════════════════
   EXPERIENCE GALLERY
══════════════════════════════════════════ */
.gallery-wrap{margin-bottom:10px;}
.gallery-eyebrow{
  font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink3);font-family:'DM Mono',monospace;margin-bottom:8px;
}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.g-item{
  position:relative;border-radius:10px;overflow:hidden;
  height:190px;cursor:pointer;
  border:1px solid var(--dk4);
  background:var(--dk2);
}
.g-item.wide{grid-column:span 2;}
.g-item img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .5s ease,filter .4s ease;
  filter:brightness(.78) saturate(.9);
}
.g-item:hover img{transform:scale(1.06);filter:brightness(.38) saturate(.7);}
.g-caption{
  position:absolute;inset:0;
  display:flex;align-items:flex-end;padding:12px;
  opacity:0;transition:opacity .3s ease;pointer-events:none;
}
.g-item:hover .g-caption{opacity:1;}
.g-caption-inner{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--terminal);line-height:1.7;
  background:rgba(10,8,6,.76);
  border:1px solid rgba(255,155,84,.16);
  border-radius:6px;padding:8px 10px;width:100%;
}
.g-caption-inner::before{content:'> ';color:var(--orange);}

/* ══════════════════════════════════════════
   SKILLS
══════════════════════════════════════════ */
.skill-label{
  font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--orange);margin-bottom:7px;
}

/* ══════════════════════════════════════════
   TIMELINE
══════════════════════════════════════════ */
.tl{display:flex;flex-direction:column;gap:0;}
.tl-row{display:flex;gap:14px;padding-bottom:22px;}
.tl-row:last-child{padding-bottom:0;}
.tl-spine{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0;}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--orange);flex-shrink:0;margin-top:5px;}
.tl-dot.sm{width:7px;height:7px;background:var(--dk4);margin-top:7px;}
.tl-line{width:1px;background:var(--dk4);flex:1;margin-top:5px;}
.tl-body{flex:1;}
.tl-co{font-size:13px;font-weight:500;color:var(--sand);margin-bottom:1px;}
.tl-role{font-size:11px;color:var(--orange);font-weight:400;margin-bottom:2px;}
.tl-date{font-size:10px;color:var(--ink3);margin-bottom:8px;font-family:'DM Mono',monospace;}
.tl-li{list-style:none;display:flex;flex-direction:column;gap:4px;}
.tl-li li{font-size:11px;font-weight:300;color:var(--ink3);line-height:1.55;padding-left:12px;position:relative;}
.tl-li li::before{content:'—';position:absolute;left:0;color:var(--dk4);}
.award{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:500;color:#FBBF24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);padding:2px 8px;border-radius:4px;margin-top:6px;margin-right:4px;}

/* ══════════════════════════════════════════
   CASE CARDS + FILTER
══════════════════════════════════════════ */
.filter-bar{
  display:flex;gap:6px;flex-wrap:wrap;
  margin-bottom:14px;padding:11px 13px;
  background:var(--dk2);border-radius:10px;border:1px solid var(--dk4);
}
.filter-btn{
  font-size:9px;font-family:'DM Mono',monospace;
  padding:4px 11px;border-radius:5px;
  border:1px solid var(--dk4);
  background:var(--dk);color:var(--ink3);
  cursor:pointer;transition:all .15s;
}
.filter-btn:hover{color:var(--sand);border-color:var(--dk3);}
.filter-btn.active{background:var(--orange-dim);color:var(--orange);border-color:var(--orange-brd);}

.case{
  background:var(--dk);border:1px solid var(--dk4);
  border-radius:var(--radius);padding:18px;margin-bottom:10px;
  transition:border-color .2s,opacity .25s,transform .25s;
}
.case:hover{border-color:var(--orange-brd);}
.case.hidden{display:none;}
.case-hd{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;}
.case-ico{
  width:36px;height:36px;border-radius:9px;
  background:var(--orange-dim);border:1px solid var(--orange-brd);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
}
.case-ico img{width:20px;height:20px;object-fit:contain;}
.case-name{font-size:13px;font-weight:500;color:var(--sand);margin-bottom:4px;}
.case-chips{display:flex;gap:4px;flex-wrap:wrap;}
.case-chip{font-size:9px;font-weight:500;color:var(--orange);background:var(--orange-dim);border:1px solid var(--orange-brd);padding:2px 7px;border-radius:4px;}
.trio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.trio-cell{background:var(--dk2);border-radius:8px;padding:10px;}
.trio-lbl{font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
.trio-txt{font-size:10px;font-weight:300;color:rgba(245,239,231,.5);line-height:1.65;}

/* ══════════════════════════════════════════
   QUOTE
══════════════════════════════════════════ */
.quote-block{background:var(--orange);border-radius:14px;padding:24px 26px;margin-bottom:10px;position:relative;overflow:hidden;}
.quote-deco{position:absolute;font-family:'Instrument Serif',serif;font-size:160px;right:-10px;bottom:-40px;color:rgba(12,10,8,.06);line-height:1;pointer-events:none;font-style:italic;}
.quote-text{font-family:'Instrument Serif',serif;font-style:italic;font-size:18px;color:var(--ink);line-height:1.45;position:relative;z-index:1;}

/* ══════════════════════════════════════════
   EDU / CERT / NOW
══════════════════════════════════════════ */
.edu{display:flex;gap:12px;padding:13px;background:var(--dk2);border-radius:10px;border:1px solid var(--dk4);margin-bottom:8px;}
.edu-ico{width:32px;height:32px;border-radius:8px;background:var(--orange-dim);border:1px solid var(--orange-brd);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.edu-title{font-size:12px;font-weight:500;color:var(--sand);margin-bottom:2px;}
.edu-sub{font-size:11px;color:var(--orange);}
.edu-date{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace;}
.cert{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--dk2);border-radius:8px;border:1px solid var(--dk4);margin-bottom:6px;}
.cert-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.cert-name{font-size:11px;font-weight:300;color:var(--sand);flex:1;}
.cert-yr{font-size:10px;font-family:'DM Mono',monospace;}
.lang-row{display:flex;gap:8px;flex-wrap:wrap;}
.lang{background:var(--dk);border:1px solid var(--dk4);border-radius:10px;padding:11px 16px;text-align:center;flex:1;min-width:80px;}
.lang-flag{font-size:18px;margin-bottom:4px;}

<script>
/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
const isUrl = s => s && (s.startsWith('http://') || s.startsWith('https://'));

function renderIcon(val, size=20){
  if(isUrl(val)) return `<img src="${val}" style="width:${size}px;height:${size}px;object-fit:contain;border-radius:3px;" alt="" loading="lazy"/>`;
  return val;
}

function el(tag, cls='', html='', attrs={}){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html) e.innerHTML = html;
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
  return e;
}

function go(id, tabEl){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById(id)?.classList.add('on');
  if(tabEl) tabEl.classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ══════════════════════════════════════════
   NIGHT OPS
══════════════════════════════════════════ */
function initNightOps(){
  const h = new Date().getHours();
  if(h >= 18 || h < 6){
    document.body.classList.add('night-ops');
    const tag = document.getElementById('nightTag');
    if(tag) tag.style.display = 'inline-flex';
  }
}

/* ══════════════════════════════════════════
   CURSOR GLOW
══════════════════════════════════════════ */
function initCursorGlow(){
  const glow = document.getElementById('cursorGlow');
  if(!glow) return;
  let visible = false;
  document.addEventListener('mousemove', e => {
    glow.style.left = e.clientX + 'px';
    glow.style.top  = e.clientY + 'px';
    if(!visible){ glow.style.opacity='1'; visible=true; }
  });
  document.addEventListener('mouseleave', () => { glow.style.opacity='0'; visible=false; });
}

/* ══════════════════════════════════════════
   STATUS ROTATOR
══════════════════════════════════════════ */
function initStatusRotator(messages){
  const el = document.getElementById('statusMsg');
  if(!el || !messages.length) return;
  let i = 0;
  function tick(){
    el.style.opacity = '0';
    setTimeout(() => { el.textContent = messages[i % messages.length]; el.style.opacity='1'; i++; }, 500);
  }
  tick();
  setInterval(tick, 4500);
}

/* ══════════════════════════════════════════
   ANIMATED COUNTERS
══════════════════════════════════════════ */
function animateCounter(el, target, suffix, duration=1200){
  const start = performance.now();
  const isFloat = String(target).includes('.');
  function step(now){
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    const val = isFloat ? (target * ease).toFixed(1) : Math.round(target * ease);
    el.textContent = val + suffix;
    if(p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function initCounters(){
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        const el = entry.target;
        const target = parseFloat(el.dataset.target);
        const suffix = el.dataset.suffix || '';
        animateCounter(el, target, suffix);
        observer.unobserve(el);
      }
    });
  }, {threshold:.3});
  document.querySelectorAll('.metric-n[data-target]').forEach(el => observer.observe(el));
}

/* ══════════════════════════════════════════
   CMD PALETTE
══════════════════════════════════════════ */
function initCommandPalette(commands){
  const overlay = document.getElementById('cmdOverlay');
  const input   = document.getElementById('cmdInput');
  const result  = document.getElementById('cmdResult');
  const hints   = document.getElementById('cmdHints');

  Object.keys(commands).forEach(cmd => {
    const b = el('button','cmd-hint',cmd);
    b.onclick = () => { input.value = cmd; runCmd(cmd); };
    hints.appendChild(b);
  });

  function open(){ overlay.classList.add('open'); input.value=''; result.classList.remove('show'); setTimeout(()=>input.focus(),60); }
  function close(){ overlay.classList.remove('open'); }

  function runCmd(raw){
    const cmd = raw.trim().toLowerCase();
    const txt = commands[cmd];
    result.textContent = txt || `Command not found: "${cmd}"\nAvailable: ${Object.keys(commands).join(' · ')}`;
    result.classList.add('show');
  }

  document.addEventListener('keydown', e => {
    if((e.metaKey || e.ctrlKey) && e.key === 'k'){ e.preventDefault(); overlay.classList.contains('open') ? close() : open(); }
    if(e.key === 'Escape') close();
    if(e.key === 'Enter' && overlay.classList.contains('open')) runCmd(input.value);
  });
  overlay.addEventListener('click', e => { if(e.target === overlay) close(); });
}

/* ══════════════════════════════════════════
   NAV
══════════════════════════════════════════ */
let navData = [];
function buildNav(navItems){
  navData = navItems;
  const container = document.getElementById('navTabs');
  navItems.forEach((t, i) => {
    const btn = el('button','tab' + (i===0?' on':''), t.label);
    btn.onclick = () => go(t.page, btn);
    container.appendChild(btn);
  });
}

    document.getElementById('hCta1').onclick = () => go(hero.cta_primary_target, document.querySelectorAll('.tab')[3]);
    document.getElementById('hCta2').onclick = () => go(hero.cta_secondary_target, document.querySelectorAll('.tab')[4]);
  }

  // TICKER
  const tDup = [...d.ticker_items, ...d.ticker_items];
  page.appendChild(el('div','ticker',`<div class="ticker-track">${tDup.map(t=>`<span class="t-i"><span class="t-sym">${t.sym}</span>${t.text}</span>`).join('')}</div>`));

  // BENTO
  const bento = el('div','bento');

  // Live Metrics
  const visMetrics = d.live_metrics.filter(m => m.visible !== false);
  const metricsHtml = visMetrics.map(m=>`
    <div class="metric">
      <span class="metric-n" data-target="${m.number}" data-suffix="${m.suffix}">${m.number}${m.suffix}</span>
      <span class="metric-l">${m.label}</span>
    </div>`).join('');
  bento.appendChild(el('div','card ck-dk w2',`
    <div class="eye eye-m">system metrics · live</div>
    <div class="metrics-grid">${metricsHtml}</div>
  `));

  // Highlight cards
  d.highlight_cards.forEach(c => {
    if(!c.visible) return;
    bento.appendChild(el('div',`card ${c.skin}`,`
      <div class="eye ${c.eye_style}">${c.eye}</div>
      <div class="big ${c.big_style}">${c.big}</div>
      <div class="body ${c.body_style}" style="margin-top:6px;">${c.body}</div>
    `));
  });

  // Domain grid
  const domainHtml = d.domain_coverage.filter(x=>x.visible).map(dom=>`
    <div class="domain-cell">
      <div class="domain-icon">${renderIcon(dom.icon)}</div>
      <div class="domain-name">${dom.name}</div>
      <div class="domain-desc">${dom.desc}</div>
    </div>`).join('');
  bento.appendChild(el('div','card ck-dk2 w2',`
    <div class="eye eye-m">domain coverage</div>
    <div class="big big-s fs20" style="margin-bottom:10px;">WHERE I OPERATE</div>
    <div class="domain-grid">${domainHtml}</div>
  `));

  page.appendChild(bento);

  // MEMORY LOGS
  const visLogs = d.memory_logs.filter(l => l.visible);
  if(visLogs.length){
    const logsWrap = el('div','card ck-dk w2 memory-logs');
    logsWrap.innerHTML = `<div class="memory-header">// system memory logs</div>` +
      visLogs.map(l=>`
        <div class="memory-row">
          <div class="memory-year">${l.year}</div>
          <div class="memory-note">${l.note}</div>
        </div>`).join('');
    page.appendChild(logsWrap);
  }

  // GALLERY
  const visGallery = d.experience_gallery.filter(g => g.visible !== false);
  if(visGallery.length){
    const gWrap = el('div','gallery-wrap');
    gWrap.innerHTML = `<div class="gallery-eyebrow">// experience log · recharge protocol</div>`;
    const grid = el('div','gallery-grid');
    visGallery.forEach((item, i) => {
      const isWide = item.wide === true || i === 0;
      const cell = el('div','g-item' + (isWide ? ' wide' : ''));
      const img = document.createElement('img');
      img.src = item.image_url; img.alt = ''; img.loading = 'lazy';
      const cap = el('div','g-caption',`<div class="g-caption-inner">${item.caption}</div>`);
      cell.appendChild(img); cell.appendChild(cap);
      grid.appendChild(cell);
    });
    gWrap.appendChild(grid);
    page.appendChild(gWrap);
  }
}

/* ══════════════════════════════════════════
   PAGE 4 — /deployments
══════════════════════════════════════════ */
function buildPage4(d){
  const page = document.getElementById('p4');

  const strDup = [...d.work_strip,...d.work_strip];
  page.appendChild(el('div','strip',`<div class="strip-track">${strDup.map(s=>`<span class="strip-item">${s} <span class="strip-sep">✦</span></span>`).join('')}</div>`));

  // Extract unique tags
  const allTags = ['ALL'];
  d.case_studies.filter(c=>c.visible).forEach(c => {
    (c.tags||[]).forEach(t => { if(!allTags.includes(t)) allTags.push(t); });
  });

  const filterBar = el('div','filter-bar');
  allTags.forEach(tag => {
    const btn = el('button','filter-btn'+(tag==='ALL'?' active':''), tag);
    btn.onclick = () => {
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.case[data-tags]').forEach(c => {
        const match = tag==='ALL' || c.dataset.tags.split('|').includes(tag);
        c.classList.toggle('hidden', !match);
      });
    };
    filterBar.appendChild(btn);
  });
  page.appendChild(filterBar);

  d.case_studies.filter(c=>c.visible).forEach(cs => {
    const iconHtml = isUrl(cs.icon)
      ? `<img src="${cs.icon}" style="width:20px;height:20px;object-fit:contain;" alt=""/>`
      : cs.icon;
    const chips = cs.chips.map(ch=>`<span class="case-chip">${ch}</span>`).join('');
    const caseEl = el('div','case',`
      <div class="case-hd">
        <div class="case-ico">${iconHtml}</div>
        <div>
          <div class="case-name">${cs.name}</div>
          <div class="case-chips">${chips}</div>
        </div>
      </div>
      <div class="trio">
        <div class="trio-cell"><div class="trio-lbl">Problem</div><div class="trio-txt">${cs.problem}</div></div>
        <div class="trio-cell"><div class="trio-lbl">What I did</div><div class="trio-txt">${cs.what_i_did}</div></div>
        <div class="trio-cell"><div class="trio-lbl">Outcome</div><div class="trio-txt">${cs.outcome}</div></div>
      </div>
    `);
    caseEl.dataset.tags = (cs.tags||[]).join('|');
    page.appendChild(caseEl);
  });
}

      </div>
    </div>`).join('');
  bento.appendChild(el('div','card ck-s w2',`
    <div class="eye eye-k">education</div>${eduHtml}
  `));

  const certHtml = ab.certifications.filter(c=>c.visible).map(c=>{
    const col  = c.is_in_progress ? 'var(--orange)' : '#4ADE80';
    const anim = c.is_in_progress ? 'animation:blink 2s infinite;' : '';
    const cls  = c.is_in_progress ? 'tg-ip' : 'tg-ok';
    return `<div class="cert">
      <div class="cert-dot" style="background:${col};${anim}"></div>
      <div class="cert-name">${c.name}</div>
      <span class="tag ${cls} cert-yr">${c.year}</span>
    </div>`;
  }).join('');
  bento.appendChild(el('div','card ck-dk w2',`
    <div class="eye eye-m">certifications</div>
    <div class="big big-s fs20" style="margin-bottom:12px;">ALWAYS LEARNING</div>
    ${certHtml}
  `));

  const nowHtml = ab.currently.filter(n=>n.visible).map(n=>`
    <div class="now-row">
      <div class="now-ico">${n.icon}</div>
      <div>
        <div class="now-title">${n.title}</div>
        <div class="now-body">${n.body}</div>
      </div>
    </div>`).join('');
  bento.appendChild(el('div','card ck-dk2 w2',`
    <div class="eye eye-m">right now</div>
    <div class="big big-s fs20" style="margin-bottom:12px;">WHAT I'M INTO</div>
    ${nowHtml}
  `));

  page.appendChild(bento);

  // CTA
  const cta = d.cta_section;
  if(cta.visible){
    const ctaEl = el('div','cta',`
      <div class="cta-deco" style="font-size:140px;left:-18px;top:-22px;">$</div>
      <div class="cta-deco" style="font-size:110px;right:8px;bottom:-28px;">€</div>
      <div class="cta-title">${cta.title}</div>
      <div class="cta-sub">${cta.subtitle}</div>
      <button class="btn-o" id="ctaBtn">${cta.button_label}</button>
      <div class="terminal-scan" id="terminalScan"></div>
    `);
    page.appendChild(ctaEl);

    let fired = false;
    document.getElementById('ctaBtn').onclick = function(){
      if(fired) return;
      fired = true;
      this.disabled = true; this.style.opacity = '.45';
      const scan = document.getElementById('terminalScan');
      scan.classList.add('show'); scan.textContent = '';
      let i = 0;
      const lines = cta.terminal_lines || [];
      const iv = setInterval(() => {
        if(i < lines.length){
          scan.textContent += lines[i] + '\n'; i++;
        } else {
          clearInterval(iv);
          const btn = document.getElementById('ctaBtn');
          btn.disabled = false; btn.style.opacity = '1';
          btn.textContent = `→ ${cta.email}`;
          btn.onclick = () => window.location.href = `mailto:${cta.email}`;
        }
      }, 160);
    };
  }
}

/* ══════════════════════════════════════════
   BOOTSTRAP
══════════════════════════════════════════ */
async function init(){
  initNightOps();
  initCursorGlow();

  let d;
  try {
    const res = await fetch('./portfolio-data.json');
    if(!res.ok) throw new Error('HTTP ' + res.status);
    d = await res.json();
  } catch(err){
    document.getElementById('p1').innerHTML = `
      <div style="padding:40px;font-family:'DM Mono',monospace;color:var(--terminal);line-height:2;">
        <div>> ERROR: Could not load portfolio-data.json</div>
        <div>> Ensure both files are in the same folder</div>
        <div>> Open via VS Code Live Server or any local server</div>
        <div>> Direct file:// open will not work (CORS)</div>
      </div>`;
    return;
  }

  document.getElementById('navLogo').textContent = d.system_status.logo_text;
  document.title = `${d.system_status.logo_text} — ${d.system_status.tagline}`;

  initStatusRotator(d.system_status.status_messages);
  buildNav(d.nav);
  buildPage1(d);
  buildPage2(d);
  buildPage3(d);
  buildPage4(d);
  buildPage5(d);

  initCounters();
  initCommandPalette(d.terminal_commands);
}

init();
</script>
